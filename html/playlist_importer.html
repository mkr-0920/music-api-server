<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌单导入助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
</head>

<body class="flex items-center justify-center min-h-screen p-4 bg-gray-50">

    <div class="card w-full max-w-2xl p-8 space-y-6">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">歌单导入助手</h1>
                <p class="text-gray-500 mt-1">同步导入网易云/QQ音乐歌单至 Navidrome。</p>
            </div>
            <a href="/music_parser.html" class="text-indigo-600 hover:text-indigo-800 font-semibold">&larr; 返回</a>
        </div>

        <div class="space-y-4">
            <h3 class="font-bold text-gray-700 border-b pb-1">1. 服务信息</h3>
            <div>
                <label class="text-sm font-medium text-gray-600">API 密钥</label>
                <input type="password" id="apiKey" class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg" placeholder="您的 API 密钥">
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="naviUrl" class="px-4 py-2 border border-gray-300 rounded-lg" placeholder="Navidrome 地址">
                <input type="text" id="naviUser" class="px-4 py-2 border border-gray-300 rounded-lg" placeholder="用户名">
            </div>
            <input type="password" id="naviPass" class="block w-full px-4 py-2 border border-gray-300 rounded-lg" placeholder="Navidrome 密码">

            <h3 class="font-bold text-gray-700 border-b pb-1 pt-2">2. 歌单信息</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="platform" class="px-4 py-2 border border-gray-300 rounded-lg">
                    <option value="netease">网易云音乐</option>
                    <option value="qq">QQ音乐</option>
                </select>
                <input type="text" id="playlistId" class="px-4 py-2 border border-gray-300 rounded-lg" placeholder="歌单 ID">
            </div>
        </div>

        <button id="submitBtn" class="w-full btn-primary text-white font-bold py-3 rounded-lg flex items-center justify-center">
            <span id="btnText">开始导入</span>
            <div id="loader" class="loader h-5 w-5 ml-3 hidden"></div>
        </button>

        <div id="result"></div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        const elements = {
            apiKey: document.getElementById('apiKey'),
            naviUrl: document.getElementById('naviUrl'),
            naviUser: document.getElementById('naviUser'),
            naviPass: document.getElementById('naviPass'),
            platform: document.getElementById('platform'),
            playlistId: document.getElementById('playlistId'),
            submitBtn: document.getElementById('submitBtn'),
            btnText: document.getElementById('btnText'),
            loader: document.getElementById('loader'),
            result: document.getElementById('result'),
        };

        elements.apiKey.value = Utils.getApiKey();

        elements.submitBtn.addEventListener('click', async () => {
            const apiKey = elements.apiKey.value.trim();
            if (!apiKey) { Utils.displayResult(elements.result, Utils.errorAlert('请输入 API 密钥。')); return; }
            Utils.saveApiKey(apiKey);
            Utils.displayResult(elements.result, '');
            Utils.showLoading(elements.submitBtn, elements.loader, elements.btnText, true, '处理中...', '开始导入');

            try {
                const res = await fetch('/api/navidrome/import', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
                    body: JSON.stringify({
                        navidrome_url: elements.naviUrl.value.trim(),
                        username: elements.naviUser.value.trim(),
                        password: elements.naviPass.value.trim(),
                        platform: elements.platform.value,
                        online_playlist_id: elements.playlistId.value.trim()
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || data.message || '导入失败');
                
                const report = data.data;
                Utils.displayResult(elements.result, `
                    <div class="p-4 bg-green-50 rounded-lg border border-green-200">
                        <h2 class="font-bold text-green-800">✓ 导入完成</h2>
                        <p class="text-sm text-green-700 mt-1">成功: ${report.added_count} / 未匹配: ${report.not_found_count}</p>
                    </div>`);
            } catch (error) { Utils.displayResult(elements.result, Utils.errorAlert(error.message)); }
            finally { Utils.showLoading(elements.submitBtn, elements.loader, elements.btnText, false, '', '开始导入'); }
        });
    </script>
</body>
</html>
