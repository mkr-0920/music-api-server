<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伴奏批量提取 - MVSep AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
        }

        .card {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loader {
            border-top-color: #667eea;
            animation: spin 1s linear infinite;
        }

        .loader-small {
            border-top-color: #3b82f6;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 自定义滚动条 */
        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .table-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .table-container::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
    </style>
</head>

<body class="p-4 md:p-8 flex flex-col items-center min-h-screen">

    <div class="card w-full max-w-6xl p-6 md:p-8 space-y-6 flex-1 flex flex-col">

        <div class="flex justify-between items-start flex-wrap gap-4 border-b border-gray-100 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-2">
                    🎙️ 伴奏批量提取工坊
                    <span
                        class="text-xs bg-indigo-100 text-indigo-800 px-2 py-1 rounded-full border border-indigo-200">BS
                        Roformer 2025.07</span>
                </h1>
                <p class="text-gray-500 mt-2">基于队列流水线，批量全自动提取、克隆元数据并入库。</p>
            </div>
            <a href="/music_parser.html"
                class="text-indigo-600 hover:text-indigo-800 font-semibold whitespace-nowrap transition-colors">&larr;
                返回主页</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
            <div class="md:col-span-3">
                <label for="apiKey" class="text-sm font-medium text-gray-700 mb-1 block">API 密钥 (X-API-Key)</label>
                <input type="password" id="apiKey"
                    class="block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-shadow"
                    placeholder="请输入您的 API 密钥">
            </div>
            <div>
                <button id="loadBtn"
                    class="w-full bg-white border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50 font-bold py-3 px-4 rounded-lg transition-colors flex items-center justify-center">
                    <span id="loadBtnText">加载本地曲库</span>
                    <div id="loadLoader"
                        class="loader ease-linear rounded-full border-4 border-t-4 border-indigo-600 h-5 w-5 ml-2 hidden">
                    </div>
                </button>
            </div>
        </div>

        <div id="actionPanel"
            class="hidden flex flex-col md:flex-row items-center justify-between gap-4 bg-gray-50 p-4 rounded-xl border border-gray-200">
            <div class="w-full md:w-1/2 relative">
                <svg class="w-5 h-5 absolute left-3 top-3 text-gray-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" id="searchInput"
                    class="block w-full pl-10 pr-4 py-2 bg-white border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                    placeholder="搜索歌手或歌名进行过滤...">
            </div>
            <button id="submitBatchBtn"
                class="w-full md:w-auto btn-primary text-white font-bold py-2.5 px-6 rounded-lg whitespace-nowrap flex items-center justify-center disabled:opacity-50"
                disabled>
                🚀 批量提取选中项 (0)
            </button>
        </div>

        <div id="messageArea"></div>

        <div id="tableContainer"
            class="table-container overflow-y-auto flex-1 border border-gray-200 rounded-xl hidden shadow-inner relative">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-100 sticky top-0 z-10 shadow-sm">
                    <tr>
                        <th class="px-5 py-4 text-left w-12"><input type="checkbox" id="selectAll"
                                class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500 cursor-pointer"></th>
                        <th class="px-5 py-4 text-left text-xs font-bold text-gray-600 uppercase tracking-wider">歌曲信息
                        </th>
                        <th class="px-5 py-4 text-left text-xs font-bold text-gray-600 uppercase tracking-wider w-24">音质
                        </th>
                        <th class="px-5 py-4 text-left text-xs font-bold text-gray-600 uppercase tracking-wider w-1/3">
                            当前状态</th>
                    </tr>
                </thead>
                <tbody id="songList" class="bg-white divide-y divide-gray-100">
                </tbody>
            </table>
        </div>

    </div>

    <script>
        const elements = {
            apiKey: document.getElementById('apiKey'),
            loadBtn: document.getElementById('loadBtn'),
            loadBtnText: document.getElementById('loadBtnText'),
            loadLoader: document.getElementById('loadLoader'),
            actionPanel: document.getElementById('actionPanel'),
            searchInput: document.getElementById('searchInput'),
            submitBatchBtn: document.getElementById('submitBatchBtn'),
            messageArea: document.getElementById('messageArea'),
            tableContainer: document.getElementById('tableContainer'),
            selectAll: document.getElementById('selectAll'),
            songList: document.getElementById('songList')
        };

        let allSongs = [];
        let pollingInterval = null;

        // 🚀 新增：全局购物车，用于在搜索重绘时记住用户打过的所有勾
        let selectedSongIds = new Set();

        // ================= 工具函数 =================
        function showMsg(html) {
            elements.messageArea.innerHTML = html;
        }

        // ================= 加载曲库 =================
        async function loadSongs() {
            const apiKey = elements.apiKey.value.trim();
            if (!apiKey) return showMsg(`<div class="bg-red-100 text-red-700 px-4 py-3 rounded-lg border border-red-200">请输入 API 密钥！</div>`);

            elements.loadLoader.classList.remove('hidden');
            elements.loadBtn.disabled = true;
            elements.loadBtnText.textContent = '正在读取...';
            showMsg('');

            try {
                const res = await fetch('/api/local/list', { headers: { 'X-API-Key': apiKey } });
                const json = await res.json();
                if (!res.ok) throw new Error(json.message || '无法连接到服务器');

                const rawSongs = json.data || [];

                const extractedSearchKeys = new Set();
                rawSongs.forEach(song => {
                    if (song.file_path && song.file_path.includes('(Instrumental)')) {
                        extractedSearchKeys.add(song.search_key);
                    }
                });

                allSongs = rawSongs
                    .filter(song => !(song.file_path && song.file_path.includes('(Instrumental)')))
                    .map(song => {
                        song.alreadyExtracted = extractedSearchKeys.has(song.search_key);
                        return song;
                    });

                // 每次重新加载曲库时，清空购物车
                selectedSongIds.clear();

                renderTable(allSongs);

                elements.actionPanel.classList.remove('hidden');
                elements.actionPanel.classList.add('flex');
                elements.tableContainer.classList.remove('hidden');

                startPollingStatus(apiKey);

            } catch (error) {
                showMsg(`<div class="bg-red-100 text-red-700 px-4 py-3 rounded-lg border border-red-200">加载失败: ${error.message}</div>`);
            } finally {
                elements.loadLoader.classList.add('hidden');
                elements.loadBtn.disabled = false;
                elements.loadBtnText.textContent = '刷新曲库';
            }
        }

        // ================= 渲染表格 =================
        function renderTable(songs) {
            // 性能优化：限制渲染条数，防止几千首歌卡死浏览器
            const displaySongs = songs.slice(0, 100);

            elements.songList.innerHTML = displaySongs.map(song => {
                const qualityBadge = song.quality === 'master' ? '<span class="bg-yellow-50 text-yellow-700 text-xs px-2 py-1 rounded border border-yellow-200 font-medium">Master</span>'
                    : song.quality === 'flac' ? '<span class="bg-blue-50 text-blue-700 text-xs px-2 py-1 rounded border border-blue-200 font-medium">FLAC</span>'
                        : '<span class="bg-gray-50 text-gray-600 text-xs px-2 py-1 rounded border border-gray-200 font-medium">Lossy</span>';

                const isDone = song.alreadyExtracted;
                const statusHtml = isDone
                    ? `<span class="inline-flex items-center gap-1 text-green-600 font-bold"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> 已提取</span>`
                    : `<span class="text-gray-400">未提取</span>`;
                const disabledAttr = isDone ? 'disabled' : '';
                const rowClass = isDone ? 'bg-gray-50 opacity-70' : 'hover:bg-indigo-50/30 transition-colors';

                // 🚀 核心修复：绘制前检查这个 ID 是否在购物车里
                const checkedAttr = selectedSongIds.has(song.id) ? 'checked' : '';

                return `
                <tr class="${rowClass}" data-song-id="${song.id}">
                    <td class="px-5 py-4">
                        <input type="checkbox" class="song-checkbox w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed" data-id="${song.id}" ${disabledAttr} ${checkedAttr}>
                    </td>
                    <td class="px-5 py-4">
                        <div class="text-sm font-bold text-gray-900 truncate max-w-xs md:max-w-md">${song.search_key}</div>
                        <div class="text-xs text-gray-500 mt-1 truncate">${song.album || '未知专辑'}</div>
                    </td>
                    <td class="px-5 py-4">${qualityBadge}</td>
                    <td class="px-5 py-4 text-sm status-cell" id="status-${song.id}">
                        ${statusHtml}
                    </td>
                </tr>
            `}).join('');

            if (songs.length > 100) {
                elements.songList.innerHTML += `<tr><td colspan="4" class="px-5 py-4 text-center text-sm text-gray-500 bg-gray-50">仅显示前 100 首（总计 ${songs.length} 首）。请使用上方搜索框查找特定歌曲。</td></tr>`;
            }

            updateSubmitButton();
            // 注意：不要在这里 forEach 绑事件了，改用下面的事件委托
        }

        // ================= 交互与过滤 =================
        function filterSongs() {
            const q = elements.searchInput.value.toLowerCase();
            const filtered = allSongs.filter(s =>
                (s.search_key && s.search_key.toLowerCase().includes(q)) ||
                (s.album && s.album.toLowerCase().includes(q))
            );
            renderTable(filtered);
            forceStatusUIUpdate();
        }

        function updateSubmitButton() {
            // 按钮上显示的数字，直接取购物车里存的数量
            const checkedCount = selectedSongIds.size;
            elements.submitBatchBtn.disabled = checkedCount === 0;
            elements.submitBatchBtn.innerHTML = `🚀 批量提取选中项 (${checkedCount})`;
        }

        // 处理全选操作
        elements.selectAll.addEventListener('change', (e) => {
            const isChecked = e.target.checked;
            // 只影响当前搜索结果里展示出来的 checkbox
            document.querySelectorAll('.song-checkbox:not(:disabled)').forEach(cb => {
                cb.checked = isChecked;
                const id = parseInt(cb.dataset.id);
                if (isChecked) {
                    selectedSongIds.add(id);
                } else {
                    selectedSongIds.delete(id);
                }
            });
            updateSubmitButton();
        });

        // 🚀 新增：事件委托，处理单个勾选框的点击（自动更新购物车）
        elements.songList.addEventListener('change', function (e) {
            if (e.target && e.target.classList.contains('song-checkbox')) {
                const id = parseInt(e.target.dataset.id);
                if (e.target.checked) {
                    selectedSongIds.add(id);
                } else {
                    selectedSongIds.delete(id);
                }
                updateSubmitButton();

                // 如果取消勾选，记得把顶部的全选按钮也取消掉
                if (!e.target.checked) elements.selectAll.checked = false;
            }
        });

        // ================= 提交队列 =================
        async function submitBatch() {
            const apiKey = elements.apiKey.value.trim();
            // 🚀 核心修复：提交时不再从 DOM 里抓取，而是直接把整个购物车扔给后端！
            const ids = Array.from(selectedSongIds);

            if (ids.length === 0) return;

            elements.submitBatchBtn.disabled = true;
            elements.submitBatchBtn.innerHTML = `<div class="loader-small ease-linear rounded-full border-2 border-t-2 border-white h-4 w-4 mr-2"></div> 提交中...`;

            try {
                const res = await fetch('/api/instrumental/batch_submit', {
                    method: 'POST',
                    headers: { 'X-API-Key': apiKey, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ song_ids: ids })
                });
                const json = await res.json();

                if (!res.ok) throw new Error(json.detail || json.message || "提交失败");

                showMsg(`<div class="bg-green-50 text-green-700 px-4 py-3 rounded-lg border border-green-200 mb-4">✅ ${json.message}</div>`);

                // 提交成功后，清空购物车并取消勾选
                selectedSongIds.clear();
                elements.selectAll.checked = false;
                document.querySelectorAll('.song-checkbox').forEach(cb => cb.checked = false);

                startPollingStatus(apiKey);

            } catch (error) {
                showMsg(`<div class="bg-red-50 text-red-700 px-4 py-3 rounded-lg border border-red-200 mb-4">❌ 提交失败: ${error.message}</div>`);
            } finally {
                updateSubmitButton();
            }
        }

        // ================= 轮询状态 =================
        let latestStatusData = {};

        function startPollingStatus(apiKey) {
            if (pollingInterval) clearInterval(pollingInterval);
            fetchQueueStatus(apiKey);
            pollingInterval = setInterval(() => fetchQueueStatus(apiKey), 3000);
        }

        async function fetchQueueStatus(apiKey) {
            try {
                const res = await fetch('/api/instrumental/queue_status', { headers: { 'X-API-Key': apiKey } });
                if (!res.ok) return;
                const json = await res.json();
                latestStatusData = json.data || {};
                forceStatusUIUpdate();
            } catch (e) {
                console.error("轮询状态失败", e);
            }
        }

        function forceStatusUIUpdate() {
            for (const [songIdStr, taskInfo] of Object.entries(latestStatusData)) {
                const songId = parseInt(songIdStr);
                const statusCell = document.getElementById(`status-${songId}`);
                const checkbox = document.querySelector(`.song-checkbox[data-id="${songId}"]`);

                if (!statusCell) continue;

                const { status, message } = taskInfo;

                let badgeHtml = '';
                if (status === 'waiting') {
                    badgeHtml = `<span class="inline-flex items-center gap-1.5 text-yellow-600 bg-yellow-50 px-2.5 py-1 rounded-md border border-yellow-200"><span class="w-1.5 h-1.5 rounded-full bg-yellow-500 animate-pulse"></span> ${message}</span>`;
                } else if (status === 'processing') {
                    badgeHtml = `<span class="inline-flex items-center gap-1.5 text-blue-600 bg-blue-50 px-2.5 py-1 rounded-md border border-blue-200"><div class="loader-small h-3 w-3 border-2 border-blue-600"></div> ${message}</span>`;
                } else if (status === 'downloading') {
                    badgeHtml = `<span class="inline-flex items-center gap-1.5 text-purple-600 bg-purple-50 px-2.5 py-1 rounded-md border border-purple-200"><svg class="w-3 h-3 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg> ${message}</span>`;
                } else if (status === 'done') {
                    badgeHtml = `<span class="inline-flex items-center gap-1 text-green-600 bg-green-50 px-2.5 py-1 rounded-md border border-green-200 font-bold"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> ${message}</span>`;
                } else if (status === 'failed') {
                    badgeHtml = `<span class="inline-flex items-center gap-1 text-red-600 bg-red-50 px-2.5 py-1 rounded-md border border-red-200" title="${message}"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg> 提取失败</span>`;
                }

                statusCell.innerHTML = badgeHtml;

                if (checkbox) {
                    if (['waiting', 'processing', 'downloading', 'done'].includes(status)) {
                        checkbox.disabled = true;
                        checkbox.classList.add('opacity-40', 'cursor-not-allowed');
                        checkbox.checked = false;
                        selectedSongIds.delete(songId); // 处理中自动移出购物车
                    } else {
                        checkbox.disabled = false;
                        checkbox.classList.remove('opacity-40', 'cursor-not-allowed');
                    }
                }
            }
            updateSubmitButton();
        }

        // ================= 事件绑定 =================
        elements.loadBtn.addEventListener('click', loadSongs);
        elements.searchInput.addEventListener('input', filterSongs);
        elements.submitBatchBtn.addEventListener('click', submitBatch);
    </script>
</body>

</html>
