<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伴奏提取工坊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <style>
        .loader-small {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen p-4 md:p-8 font-['Inter']">

    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">🎙️ 伴奏提取工坊</h1>
                <p class="text-gray-500 mt-1">基于 MVSep AI 算力，将本地曲库克隆为高质量伴奏。</p>
            </div>
            <a href="/music_parser.html" class="text-indigo-600 hover:text-indigo-800 font-semibold">&larr; 返回解析器</a>
        </div>

        <div class="card p-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="md:col-span-3">
                    <label for="apiKey" class="text-sm font-medium text-gray-700 mb-1 block">API 密钥 (X-API-Key)</label>
                    <input type="password" id="apiKey"
                        class="block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                        placeholder="请输入您的 API 密钥">
                </div>
                <button id="loadBtn" class="btn-primary text-white font-bold py-3 px-6 rounded-lg flex items-center justify-center">
                    <span id="loadBtnText">连接曲库</span>
                    <div id="loadLoader" class="loader ease-linear rounded-full border-2 border-t-2 border-white h-5 w-5 ml-3 hidden"></div>
                </button>
            </div>
        </div>

        <div id="actionPanel" class="hidden card p-4 flex flex-col md:flex-row items-center gap-4">
            <div class="relative flex-1 w-full">
                <input type="text" id="searchInput" class="block w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-500" placeholder="搜索歌曲...">
            </div>
            <button id="submitBatchBtn" disabled class="bg-purple-600 hover:bg-purple-700 disabled:bg-gray-300 text-white font-bold py-2 px-8 rounded-md transition-colors">
                加入提取队列 (0)
            </button>
        </div>

        <div id="messageArea"></div>

        <div id="tableContainer" class="hidden table-container bg-white shadow-sm">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-4 text-left"><input type="checkbox" id="selectAll"></th>
                        <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase">音质</th>
                        <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase">Search Key</th>
                        <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase">专辑</th>
                        <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                    </tr>
                </thead>
                <tbody id="songList" class="bg-white divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        const elements = {
            apiKey: document.getElementById('apiKey'),
            loadBtn: document.getElementById('loadBtn'),
            loadBtnText: document.getElementById('loadBtnText'),
            loadLoader: document.getElementById('loadLoader'),
            actionPanel: document.getElementById('actionPanel'),
            searchInput: document.getElementById('searchInput'),
            submitBatchBtn: document.getElementById('submitBatchBtn'),
            messageArea: document.getElementById('messageArea'),
            tableContainer: document.getElementById('tableContainer'),
            selectAll: document.getElementById('selectAll'),
            songList: document.getElementById('songList')
        };

        let allSongs = [];
        let pollingInterval = null;
        let selectedSongIds = new Set();
        let latestStatusData = {};

        elements.apiKey.value = Utils.getApiKey();

        function showMsg(html) { Utils.displayResult(elements.messageArea, html); }

        async function loadSongs() {
            const apiKey = elements.apiKey.value.trim();
            if (!apiKey) return showMsg(Utils.errorAlert('请输入 API 密钥！'));
            Utils.saveApiKey(apiKey);
            elements.loadLoader.classList.remove('hidden');
            elements.loadBtn.disabled = true;
            elements.loadBtnText.textContent = '读取中...';
            showMsg('');
            try {
                const res = await fetch('/api/local/list', { headers: { 'X-API-Key': apiKey } });
                const json = await res.json();
                allSongs = (json.data || []).sort((a, b) => a.id - b.id);
                renderTable(allSongs);
                elements.actionPanel.classList.remove('hidden');
                elements.tableContainer.classList.remove('hidden');
                startPollingStatus(apiKey);
            } catch (error) { showMsg(Utils.errorAlert(error.message)); }
            finally { elements.loadLoader.classList.add('hidden'); elements.loadBtn.disabled = false; elements.loadBtnText.textContent = '刷新列表'; }
        }

        function renderTable(songs) {
            elements.songList.innerHTML = songs.map(song => {
                const isInstrumental = song.is_instrumental === 1 || (song.search_key && song.search_key.includes('伴奏'));
                const isSelected = selectedSongIds.has(song.id);
                
                // 如果是已经提取过的，显示状态标签并禁用复选框
                const statusBadge = isInstrumental 
                    ? '<span class="text-green-600 font-bold flex items-center gap-1">✅ 已有伴奏</span>'
                    : `<span class="text-gray-300 text-xs italic" id="status-${song.id}">等待分析...</span>`;
                
                const checkboxAttr = isInstrumental ? 'disabled class="song-checkbox opacity-20 cursor-not-allowed"' : `class="song-checkbox" data-id="${song.id}" ${isSelected ? 'checked' : ''}`;

                return `<tr class="${isInstrumental ? 'bg-gray-50' : ''}">
                    <td class="px-6 py-4"><input type="checkbox" ${checkboxAttr}></td>
                    <td class="px-6 py-4 text-xs text-gray-400 font-mono">${song.quality}</td>
                    <td class="px-6 py-4 text-sm font-medium ${isInstrumental ? 'text-gray-400' : 'text-gray-900'}">${song.search_key}</td>
                    <td class="px-6 py-4 text-sm text-gray-500 truncate max-w-[120px]">${song.album || '-'}</td>
                    <td class="px-6 py-4">${statusBadge}</td>
                </tr>`;
            }).join('');
            forceStatusUIUpdate();
        }

        function filterSongs(e) {
            const term = e.target.value.toLowerCase();
            renderTable(allSongs.filter(s => s.search_key.toLowerCase().includes(term)));
        }

        elements.songList.addEventListener('change', e => {
            if (e.target.classList.contains('song-checkbox')) {
                const sid = parseInt(e.target.dataset.id);
                if (e.target.checked) selectedSongIds.add(sid); else selectedSongIds.delete(sid);
                updateSubmitButton();
            }
        });

        elements.selectAll.addEventListener('change', e => {
            document.querySelectorAll('.song-checkbox').forEach(cb => {
                cb.checked = e.target.checked;
                const sid = parseInt(cb.dataset.id);
                if (e.target.checked) selectedSongIds.add(sid); else selectedSongIds.delete(sid);
            });
            updateSubmitButton();
        });

        function updateSubmitButton() {
            elements.submitBatchBtn.disabled = selectedSongIds.size === 0;
            elements.submitBatchBtn.textContent = `加入提取队列 (${selectedSongIds.size})`;
        }

        async function submitBatch() {
            const apiKey = elements.apiKey.value.trim();
            try {
                const res = await fetch('/api/instrumental/batch_submit', {
                    method: 'POST',
                    headers: { 'X-API-Key': apiKey, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ song_ids: Array.from(selectedSongIds) })
                });
                const json = await res.json();
                showMsg(Utils.successAlert(json.message));
                selectedSongIds.clear();
                document.querySelectorAll('.song-checkbox').forEach(cb => cb.checked = false);
                updateSubmitButton();
            } catch (error) { showMsg(Utils.errorAlert(error.message)); }
        }

        function startPollingStatus(apiKey) {
            if (pollingInterval) clearInterval(pollingInterval);
            const poll = async () => {
                try {
                    const res = await fetch('/api/instrumental/queue_status', { headers: { 'X-API-Key': apiKey } });
                    const json = await res.json();
                    latestStatusData = json.data || {};
                    forceStatusUIUpdate();
                } catch (e) { }
            };
            poll(); pollingInterval = setInterval(poll, 3000);
        }

        function forceStatusUIUpdate() {
            for (const [songIdStr, taskInfo] of Object.entries(latestStatusData)) {
                const songId = parseInt(songIdStr);
                const statusCell = document.getElementById(`status-${songId}`);
                if (!statusCell) continue;
                const { status, message } = taskInfo;
                let badge = `<span class="text-xs text-gray-500">${message}</span>`;
                if (status === 'waiting') badge = `<span class="text-yellow-600 font-bold">${message}</span>`;
                else if (status === 'processing') badge = `<span class="text-blue-600 font-bold flex items-center gap-1"><div class="loader-small"></div>处理中</span>`;
                else if (status === 'done') badge = `<span class="text-green-600 font-bold">✓ 成功</span>`;
                else if (status === 'failed') badge = `<span class="text-red-600 font-bold">❌ 失败</span>`;
                statusCell.innerHTML = badge;
            }
        }

        elements.loadBtn.addEventListener('click', loadSongs);
        elements.searchInput.addEventListener('input', filterSongs);
        elements.submitBatchBtn.addEventListener('click', submitBatch);
    </script>
</body>
</html>
