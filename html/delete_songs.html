<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理本地音乐库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <style>
        /* 虚拟滚动核心样式 */
        #virtual-viewport {
            height: 600px;
            overflow-y: auto;
            position: relative;
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        #virtual-stretcher {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
        }

        #virtual-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            will-change: transform;
        }

        /* 保证行高一致，以便计算 */
        .v-row {
            height: 64px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .v-row:hover { background-color: #f9fafb; }
    </style>
</head>

<body class="bg-gray-50 min-h-screen p-4">

    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">管理本地音乐库</h1>
                <p class="text-gray-500 mt-2">高效管理大数据量曲库（已开启虚拟滚动优化）。</p>
            </div>
            <a href="/music_parser.html" class="text-indigo-600 hover:text-indigo-800 font-semibold">&larr; 返回解析器</a>
        </div>

        <div class="card p-6 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                <div class="md:col-span-2">
                    <label for="apiKey" class="text-sm font-medium text-gray-700">API 密钥 (X-API-Key)</label>
                    <input type="password" id="apiKey"
                        class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                        placeholder="请输入您的 API 密钥">
                </div>
                <button id="loadSongsBtn" class="btn-primary text-white font-bold py-3 px-6 rounded-lg flex items-center justify-center">
                    <span id="btnText">加载/刷新歌曲列表</span>
                    <div id="loader" class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-5 w-5 ml-3 hidden"></div>
                </button>
            </div>

            <div id="controls" class="hidden flex flex-col md:flex-row md:items-center justify-between gap-4 pt-4 border-t border-gray-100">
                <div class="relative flex-1 max-w-md">
                    <input type="text" id="searchInput" class="block w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-500" placeholder="快速搜索关键词...">
                </div>
                <div class="flex items-center gap-4">
                    <span id="statsText" class="text-sm text-gray-500 font-medium"></span>
                    <button id="deleteBtn" disabled class="bg-red-500 hover:bg-red-600 disabled:bg-gray-300 text-white font-bold py-2 px-6 rounded-md transition-colors">
                        删除选中 (0)
                    </button>
                </div>
            </div>
        </div>

        <div id="result"></div>

        <!-- 虚拟滚动容器 -->
        <div id="virtual-viewport" class="hidden shadow-sm">
            <!-- 撑起滚动条的虚层 -->
            <div id="virtual-stretcher"></div>
            <!-- 实际渲染内容的实层 -->
            <div id="virtual-content">
                <div class="bg-gray-50 border-b border-gray-200 flex items-center font-bold text-xs text-gray-500 uppercase sticky top-0 z-20 h-[48px]">
                    <div class="w-12 px-4"><input type="checkbox" id="selectAll"></div>
                    <div class="w-16 px-4">ID</div>
                    <div class="w-20 px-4">类型</div>
                    <div class="flex-1 px-4">Search Key</div>
                    <div class="w-48 px-4">专辑</div>
                    <div class="w-24 px-4 text-center">音质</div>
                </div>
                <div id="songList"></div>
            </div>
        </div>
    </div>

    <!-- 确认删除弹窗 -->
    <div id="confirmationModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
            <h3 class="text-xl font-bold text-gray-900 mb-4">确认删除</h3>
            <p class="text-gray-500 mb-6">您确定要删除选中的 <strong id="deleteCount"></strong> 首歌曲吗？</p>
            <div class="flex justify-center gap-4">
                <button id="cancelDelete" class="px-6 py-2 bg-gray-200 rounded-md">取消</button>
                <button id="confirmDelete" class="px-6 py-2 bg-red-600 text-white rounded-md">确认删除</button>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        const ROW_HEIGHT = 64; // px
        const HEADER_HEIGHT = 48;
        const BUFFER = 10;

        const elements = {
            apiKey: document.getElementById('apiKey'),
            loadSongsBtn: document.getElementById('loadSongsBtn'),
            btnText: document.getElementById('btnText'),
            loader: document.getElementById('loader'),
            result: document.getElementById('result'),
            controls: document.getElementById('controls'),
            searchInput: document.getElementById('searchInput'),
            deleteBtn: document.getElementById('deleteBtn'),
            statsText: document.getElementById('statsText'),
            viewport: document.getElementById('virtual-viewport'),
            stretcher: document.getElementById('virtual-stretcher'),
            content: document.getElementById('virtual-content'),
            selectAll: document.getElementById('selectAll'),
            songList: document.getElementById('songList'),
            modal: document.getElementById('confirmationModal'),
            deleteCount: document.getElementById('deleteCount'),
            cancelDelete: document.getElementById('cancelDelete'),
            confirmDelete: document.getElementById('confirmDelete'),
        };

        let allSongs = [];
        let filteredSongs = [];
        let selectedSongIds = new Set();

        elements.apiKey.value = Utils.getApiKey();

        function showLoading(isLoading) {
            Utils.showLoading(elements.loadSongsBtn, elements.loader, elements.btnText, isLoading, '正在加载...', '加载/刷新歌曲列表');
        }

        async function loadSongs() {
            const apiKey = elements.apiKey.value.trim();
            if (!apiKey) { Utils.displayResult(elements.result, Utils.errorAlert('请输入API密钥。')); return; }
            Utils.saveApiKey(apiKey);
            showLoading(true);
            Utils.displayResult(elements.result, '');
            elements.controls.classList.add('hidden');
            elements.viewport.classList.add('hidden');

            try {
                const response = await fetch('/api/local/list', { headers: { 'X-API-Key': apiKey } });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || '加载失败');
                allSongs = (data.data || []).sort((a, b) => a.id - b.id);
                filteredSongs = [...allSongs];
                
                setupVirtualScroll();
                elements.controls.classList.remove('hidden');
                elements.viewport.classList.remove('hidden');
                updateDeleteButton();
            } catch (error) {
                Utils.displayResult(elements.result, Utils.errorAlert(error.message));
            } finally {
                showLoading(false);
            }
        }

        function setupVirtualScroll() {
            const totalHeight = filteredSongs.length * ROW_HEIGHT + HEADER_HEIGHT;
            elements.stretcher.style.height = `${totalHeight}px`;
            elements.statsText.textContent = `共 ${filteredSongs.length} 首歌曲`;
            renderVisiblePart();
        }

        function renderVisiblePart() {
            const scrollTop = elements.viewport.scrollTop;
            const viewportHeight = elements.viewport.clientHeight;

            // 计算起始和结束索引
            let startIndex = Math.floor(Math.max(0, scrollTop - HEADER_HEIGHT) / ROW_HEIGHT);
            let endIndex = Math.min(filteredSongs.length, Math.ceil((scrollTop + viewportHeight) / ROW_HEIGHT) + BUFFER);
            
            // 修正 buffer 起点
            startIndex = Math.max(0, startIndex - BUFFER);

            const visibleItems = filteredSongs.slice(startIndex, endIndex);
            const offsetY = startIndex * ROW_HEIGHT + HEADER_HEIGHT;

            elements.songList.style.transform = `translateY(${offsetY}px)`;
            elements.songList.innerHTML = visibleItems.map(song => {
                const isInstrumental = song.is_instrumental === 1 || (song.search_key && song.search_key.includes('伴奏'));
                const typeBadge = isInstrumental ? '<span class="text-purple-600 font-bold">伴奏</span>' : '<span class="text-blue-600 font-bold">原曲</span>';
                const isChecked = selectedSongIds.has(song.id);

                return `
                <div class="v-row text-sm" data-id="${song.id}">
                    <div class="w-12 px-4"><input type="checkbox" class="song-checkbox" data-id="${song.id}" ${isChecked ? 'checked' : ''}></div>
                    <div class="w-16 px-4 text-gray-500">${song.id}</div>
                    <div class="w-20 px-4 text-xs">${typeBadge}</div>
                    <div class="flex-1 px-4 font-medium text-gray-900 truncate" title="${song.search_key}">${song.search_key}</div>
                    <div class="w-48 px-4 text-gray-500 truncate" title="${song.album || 'N/A'}">${song.album || 'N/A'}</div>
                    <div class="w-24 px-4 text-center text-gray-500 font-mono text-xs uppercase">${song.quality}</div>
                </div>`;
            }).join('');
        }

        // 核心滚动监听
        elements.viewport.addEventListener('scroll', renderVisiblePart);

        elements.loadSongsBtn.addEventListener('click', loadSongs);

        elements.searchInput.addEventListener('input', e => {
            const term = e.target.value.toLowerCase();
            filteredSongs = allSongs.filter(s => 
                s.search_key.toLowerCase().includes(term) || (s.album && s.album.toLowerCase().includes(term))
            );
            elements.viewport.scrollTop = 0; // 重置滚动
            setupVirtualScroll();
        });

        // 统一处理勾选逻辑 (利用事件委托，因为行是动态生成的)
        elements.songList.addEventListener('change', e => {
            if (e.target.classList.contains('song-checkbox')) {
                const sid = parseInt(e.target.dataset.id);
                if (e.target.checked) selectedSongIds.add(sid);
                else selectedSongIds.delete(sid);
                updateDeleteButton();
            }
        });

        elements.selectAll.addEventListener('change', e => {
            if (e.target.checked) {
                filteredSongs.forEach(s => selectedSongIds.add(s.id));
            } else {
                filteredSongs.forEach(s => selectedSongIds.delete(s.id));
            }
            renderVisiblePart();
            updateDeleteButton();
        });

        function updateDeleteButton() {
            const count = selectedSongIds.size;
            elements.deleteBtn.disabled = count === 0;
            elements.deleteBtn.textContent = `删除选中 (${count})`;
        }

        elements.deleteBtn.addEventListener('click', () => {
            elements.deleteCount.textContent = selectedSongIds.size;
            elements.modal.classList.remove('hidden');
        });

        elements.cancelDelete.addEventListener('click', () => elements.modal.classList.add('hidden'));

        elements.confirmDelete.addEventListener('click', async () => {
            elements.modal.classList.add('hidden');
            const apiKey = elements.apiKey.value.trim();
            const selectedIds = Array.from(selectedSongIds);
            try {
                const res = await fetch('/api/local/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
                    body: JSON.stringify({ ids: selectedIds })
                });
                const data = await res.json();
                Utils.displayResult(elements.result, Utils.successAlert(data.message));
                selectedSongIds.clear();
                loadSongs();
            } catch (error) {
                Utils.displayResult(elements.result, Utils.errorAlert(error.message));
            }
        });
    </script>
</body>
</html>
