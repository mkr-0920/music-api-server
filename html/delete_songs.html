<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理本地音乐库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
</head>

<body class="bg-gray-50 min-h-screen p-4">

    <div class="max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">管理本地音乐库</h1>
                <p class="text-gray-500 mt-2">查看、筛选并批量清理您的本地曲库文件。</p>
            </div>
            <a href="/music_parser.html" class="text-indigo-600 hover:text-indigo-800 font-semibold">&larr; 返回解析器</a>
        </div>

        <div class="card p-6 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                <div class="md:col-span-2">
                    <label for="apiKey" class="text-sm font-medium text-gray-700">API 密钥 (X-API-Key)</label>
                    <input type="password" id="apiKey"
                        class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                        placeholder="请输入您的 API 密钥">
                </div>
                <button id="loadSongsBtn" class="btn-primary text-white font-bold py-3 px-6 rounded-lg flex items-center justify-center">
                    <span id="btnText">加载/刷新歌曲列表</span>
                    <div id="loader" class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-6 w-6 ml-3 hidden"></div>
                </button>
            </div>

            <div id="controls" class="hidden flex flex-col md:flex-row md:items-center justify-between gap-4 pt-4 border-t border-gray-100">
                <div class="relative flex-1 max-w-md">
                    <input type="text" id="searchInput" class="block w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-500" placeholder="快速搜索关键词...">
                </div>
                <button id="deleteBtn" disabled class="bg-red-500 hover:bg-red-600 disabled:bg-gray-300 text-white font-bold py-2 px-6 rounded-md transition-colors">
                    删除选中歌曲
                </button>
            </div>
        </div>

        <div id="result"></div>

        <div class="table-container bg-white shadow-sm hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 text-left"><input type="checkbox" id="selectAll"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">类型</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Search Key</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">专辑</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">音质</th>
                    </tr>
                </thead>
                <tbody id="songList" class="bg-white divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </div>

    <!-- 弹窗部分保持最简结构 -->
    <div id="confirmationModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
            <h3 class="text-xl font-bold text-gray-900 mb-4">确认删除</h3>
            <p class="text-gray-500 mb-6">您确定要删除选中的 <strong id="deleteCount"></strong> 首歌曲吗？</p>
            <div class="flex justify-center gap-4">
                <button id="cancelDelete" class="px-6 py-2 bg-gray-200 rounded-md">取消</button>
                <button id="confirmDelete" class="px-6 py-2 bg-red-600 text-white rounded-md">确认删除</button>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        const elements = {
            apiKey: document.getElementById('apiKey'),
            loadSongsBtn: document.getElementById('loadSongsBtn'),
            btnText: document.getElementById('btnText'),
            loader: document.getElementById('loader'),
            result: document.getElementById('result'),
            controls: document.getElementById('controls'),
            searchInput: document.getElementById('searchInput'),
            deleteBtn: document.getElementById('deleteBtn'),
            tableContainer: document.querySelector('.table-container'),
            selectAll: document.getElementById('selectAll'),
            songList: document.getElementById('songList'),
            modal: document.getElementById('confirmationModal'),
            deleteCount: document.getElementById('deleteCount'),
            cancelDelete: document.getElementById('cancelDelete'),
            confirmDelete: document.getElementById('confirmDelete'),
        };

        let allSongs = [];
        elements.apiKey.value = Utils.getApiKey();

        function showLoading(isLoading) {
            Utils.showLoading(elements.loadSongsBtn, elements.loader, elements.btnText, isLoading, '正在加载...', '加载/刷新歌曲列表');
        }

        async function loadSongs() {
            const apiKey = elements.apiKey.value.trim();
            if (!apiKey) { Utils.displayResult(elements.result, Utils.errorAlert('请输入API密钥。')); return; }
            Utils.saveApiKey(apiKey);
            showLoading(true);
            Utils.displayResult(elements.result, '');
            elements.controls.classList.add('hidden');
            elements.tableContainer.classList.add('hidden');

            try {
                const response = await fetch('/api/local/list', { headers: { 'X-API-Key': apiKey } });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || '加载失败');
                allSongs = (data.data || []).sort((a, b) => a.id - b.id);
                renderTable(allSongs);
                elements.controls.classList.remove('hidden');
                elements.tableContainer.classList.remove('hidden');
                updateDeleteButton();
            } catch (error) {
                Utils.displayResult(elements.result, Utils.errorAlert(error.message));
            } finally {
                showLoading(false);
            }
        }

        function renderTable(songs) {
            elements.songList.innerHTML = songs.map(song => {
                const isInstrumental = song.is_instrumental === 1 || (song.search_key && song.search_key.includes('伴奏'));
                const typeBadge = isInstrumental ? '<span class="text-purple-600 font-bold">伴奏</span>' : '<span class="text-blue-600 font-bold">原曲</span>';
                return `<tr>
                    <td class="px-4 py-3"><input type="checkbox" class="song-checkbox" data-id="${song.id}"></td>
                    <td class="px-4 py-3 text-sm text-gray-500">${song.id}</td>
                    <td class="px-4 py-3 text-xs">${typeBadge}</td>
                    <td class="px-4 py-3 text-sm font-medium truncate max-w-xs">${song.search_key}</td>
                    <td class="px-4 py-3 text-sm text-gray-500 truncate max-w-[120px]">${song.album || 'N/A'}</td>
                    <td class="px-4 py-3 text-sm text-gray-500">${song.quality}</td>
                </tr>`;
            }).join('');
        }

        elements.loadSongsBtn.addEventListener('click', loadSongs);
        elements.searchInput.addEventListener('input', e => {
            const term = e.target.value.toLowerCase();
            const filtered = allSongs.filter(s => s.search_key.toLowerCase().includes(term) || (s.album && s.album.toLowerCase().includes(term)));
            renderTable(filtered);
        });
        elements.selectAll.addEventListener('change', e => {
            document.querySelectorAll('.song-checkbox').forEach(cb => cb.checked = e.target.checked);
            updateDeleteButton();
        });
        elements.songList.addEventListener('change', e => { if (e.target.classList.contains('song-checkbox')) updateDeleteButton(); });
        function updateDeleteButton() {
            const selected = document.querySelectorAll('.song-checkbox:checked').length;
            elements.deleteBtn.disabled = selected === 0;
            elements.deleteBtn.textContent = `删除选中歌曲 (${selected})`;
        }
        elements.deleteBtn.addEventListener('click', () => {
            elements.deleteCount.textContent = document.querySelectorAll('.song-checkbox:checked').length;
            elements.modal.classList.remove('hidden');
        });
        elements.cancelDelete.addEventListener('click', () => elements.modal.classList.add('hidden'));
        elements.confirmDelete.addEventListener('click', async () => {
            elements.modal.classList.add('hidden');
            const apiKey = elements.apiKey.value.trim();
            const selectedIds = Array.from(document.querySelectorAll('.song-checkbox:checked')).map(cb => parseInt(cb.dataset.id));
            try {
                const res = await fetch('/api/local/delete', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey }, body: JSON.stringify({ ids: selectedIds }) });
                const data = await res.json();
                Utils.displayResult(elements.result, Utils.successAlert(data.message));
                loadSongs();
            } catch (error) { Utils.displayResult(elements.result, Utils.errorAlert(error.message)); }
        });
    </script>
</body>
</html>
